services:
  social-listen:
    build: .
    container_name: social-listen
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
      - ./config.yml:/app/config.yml:ro
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/social_listen.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 60s
      timeout: 10s
      retries: 3
